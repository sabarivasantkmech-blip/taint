name: Deploy Dev Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dev-pages
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy dev site
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JavaScript syntax check
        run: |
          node --check assets/js/app.js
          node --check assets/js/supabase-runtime-config.js
          node --check scripts/write-supabase-config.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare dev static site bundle
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp -R assets vendor _site/
          node scripts/write-supabase-config.mjs _site/supabase-config.js
          touch _site/.nojekyll
          grep -q '"environment": "dev"' _site/supabase-config.js
          grep -q 'https://pywjwsrjzgkvgplkxdry.supabase.co' _site/supabase-config.js
          test ! -e _site/taint_supabase_schema.sql
          test ! -e _site/README.md

      - name: Upload dev site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
