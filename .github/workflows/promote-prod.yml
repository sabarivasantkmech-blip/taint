name: Promote Dev To Prod

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: Branch to promote into production
        required: true
        default: develop
      release_title:
        description: Release PR title
        required: true
        default: Release dev to production

permissions:
  contents: read
  pull-requests: write

jobs:
  create-release-pr:
    name: Create production release PR
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const source = core.getInput('source_branch');
            const title = core.getInput('release_title');
            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              head: `${owner}:${source}`,
            });
            if (existing.length) {
              core.notice(`Release PR already exists: ${existing[0].html_url}`);
              return;
            }
            const body = [
              'Production release request.',
              '',
              '- Source branch: `' + source + '`',
              '- Target branch: `main`',
              '- Required checks: Dev CI and production bundle validation',
              '- Deployment gate: GitHub Environment `production` approval after merge',
            ].join('\n');
            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: source,
              base: 'main',
              body,
              maintainer_can_modify: true,
            });
            core.notice(`Created release PR: ${pr.data.html_url}`);
